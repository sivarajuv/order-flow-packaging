spring.application.name=orderflow

# Database
# Defaults point to local PostgreSQL so the app can run without Amazon RDS.
# Override with DB_URL, DB_DRIVER, DB_USERNAME, DB_PASSWORD and DB_DIALECT if needed.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderflow}
spring.datasource.driver-class-name=${DB_DRIVER:org.postgresql.Driver}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.database-platform=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Server
server.address=0.0.0.0
#server.port=8080
server.port=${PORT:5000}

# CORS
#cors.allowed-origins=http://localhost:3000,http://localhost:5173
cors.allowed-origins=*
# Anthropic AI
#anthropic.api.key=shusdhfhsdfjsdfhjksdhf
anthropic.api.key=${ANTHROPIC_API_KEY}
anthropic.model=claude-sonnet-4-20250514
anthropic.api.max-tokens=1024
